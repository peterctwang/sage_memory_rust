name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: CLAUDE.md presence (CONSTITUTION §3.5 #1)
        run: cargo run -q -p gen-claude-index -- --presence

      - name: CLAUDE_INDEX.md freshness (CONSTITUTION §3.5 #3)
        run: cargo run -q -p gen-claude-index -- --check

  no-dev-deps:
    name: src compiles without dev-dependencies (CONSTITUTION §2.4)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-hack --locked
      - run: cargo hack check --workspace --no-dev-deps
